<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Récepteur de Liens</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ... VOS STYLES CSS RESTENT STRICTEMENT IDENTIQUES ... */
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg: #F3F4F6;
            --surface: #FFFFFF;
            --text: #1F2937;
            --text-light: #6B7280;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background: var(--surface);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: var(--text); }
        p.subtitle { color: var(--text-light); font-size: 0.9rem; margin-bottom: 1.5rem; }
        
        input[type="text"], input[type="number"], input[type="date"], input[type="time"], input[type="tel"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #D1D5DB;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
        }
        button:hover { background-color: var(--primary-hover); }
        button:disabled { background-color: #9CA3AF; cursor: not-allowed; }
        
        #main-app { display: none; }
        
        .link-list { text-align: left; max-height: 400px; overflow-y: auto; margin-top: 15px; }
        .link-item {
            background: #F9FAFB;
            border: 1px solid #E5E7EB;
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: transform 0.1s;
        }
        .link-item:hover { transform: translateX(4px); border-color: #D1D5DB; }
        .link-item a { color: var(--primary); text-decoration: none; font-weight: 500; word-break: break-all; }
        .link-item a:hover { text-decoration: underline; }
        .empty-state { text-align: center; color: var(--text-light); font-style: italic; padding: 20px 0; }

        #toggle-filters {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1001;
            width: auto;
            background-color: #10B981;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #toggle-filters:hover { background-color: #059669; }

        #filter-form {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(243, 244, 246, 0.95);
            backdrop-filter: blur(5px);
            z-index: 1000;
            display: none; 
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            box-sizing: border-box;
        }
        .filter-container {
            background: white;
            padding: 1.5rem;
            border-radius: 16px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: left;
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid #E5E7EB;
            margin-bottom: 20px;
        }
        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            padding: 10px;
            font-weight: 600;
            color: var(--text-light);
            cursor: pointer;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            border-radius: 0;
            font-size: 0.9rem;
        }
        .tab-btn:hover { background-color: transparent; color: var(--text); }
        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .autocomplete-wrapper { position: relative; }
        .suggestions-list {
            position: absolute;
            top: calc(100% - 15px);
            left: 0; right: 0;
            background: white;
            border: 1px solid #D1D5DB;
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
            margin: 0; padding: 0;
            list-style: none;
            z-index: 1002;
            display: none;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .suggestions-list li { padding: 10px 12px; cursor: pointer; font-size: 0.9rem; border-bottom: 1px solid #F3F4F6; }
        .suggestions-list li:hover { background-color: #F9FAFB; color: var(--primary); }
        
        .selected-cities-container { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .city-tag { background-color: var(--primary); color: white; padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; display: flex; align-items: center; gap: 6px; }
        .city-tag span.close-btn { cursor: pointer; font-weight: bold; background: rgba(255,255,255,0.2); border-radius: 50%; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
        .city-tag span.close-btn:hover { background: rgba(255,255,255,0.4); }

        fieldset { border: 1px solid #E5E7EB; border-radius: 8px; padding: 15px; margin-bottom: 15px; background-color: #F9FAFB; }
        legend { font-size: 0.9rem; font-weight: 600; padding: 0 8px; background: white; border-radius: 4px; border: 1px solid #E5E7EB; }
    </style>
</head>
<body>

    <button id="toggle-filters">⚙️ Mes Filtres de Recherche</button>

    <div id="filter-form">
        <div class="filter-container" style="max-height: 90vh; overflow-y: auto;">
            <h2 style="margin-top: 0; margin-bottom: 1rem; text-align: center; color: var(--text);">⚙️ Filtres de Recherche</h2>
            
            <div class="tabs">
                <button class="tab-btn active" data-target="tab1">1. Origine & Prix</button>
                <button class="tab-btn" data-target="tab2">2. Filtres Avancés</button>
            </div>

            <div id="tab1" class="tab-content active">
                <fieldset>
                    <legend>Origine & Rayon</legend>
                    <div class="autocomplete-wrapper" style="margin-bottom: 10px;">
                        <input type="text" id="origin-input" placeholder="Ajouter une origine (ex: Paris)..." autocomplete="off" style="margin-bottom: 5px;">
                        <ul id="origin-suggestions" class="suggestions-list"></ul>
                    </div>
                    <div id="selected-origins" class="selected-cities-container"></div>
                    <label style="font-size: 0.8rem; font-weight: 500;">Rayon d'origine (km)</label>
                    <input type="number" id="origin-radius" placeholder="Ex: 50" value="50" style="margin-bottom: 0;">
                </fieldset>
                <fieldset>
                    <legend>Équipement</legend>
                    <input type="text" id="equipment-input" placeholder="Ex: 16 sélectionnés" style="margin-bottom: 0;">
                </fieldset>
                <fieldset>
                    <legend>Prix par km (€)</legend>
                    <div style="display: flex; gap: 10px;">
                        <div style="flex: 1;">
                            <label style="font-size: 0.8rem; font-weight: 500;">Tarif Min</label>
                            <input type="number" id="rate-km-min" step="0.01" placeholder="Ex: 1.00" style="margin-bottom: 0;">
                        </div>
                        <div style="flex: 1;">
                            <label style="font-size: 0.8rem; font-weight: 500;">Tarif Max</label>
                            <input type="number" id="rate-km-max" step="0.01" placeholder="Ex: 2.50" style="margin-bottom: 0;">
                        </div>
                    </div>
                </fieldset>
            </div>

            <div id="tab2" class="tab-content">
                <fieldset>
                    <legend>Destination & Rayon</legend>
                    <div class="autocomplete-wrapper" style="margin-bottom: 10px;">
                        <input type="text" id="dest-input" placeholder="Ajouter une destination..." autocomplete="off" style="margin-bottom: 5px;">
                        <ul id="dest-suggestions" class="suggestions-list"></ul>
                    </div>
                    <div id="selected-destinations" class="selected-cities-container"></div>
                    <input type="number" id="dest-radius" placeholder="Rayon (en km)" style="margin-bottom: 0;">
                </fieldset>
                <fieldset>
                    <legend>Période</legend>
                    <label style="font-size: 0.8rem; font-weight: 500;">Commencer</label>
                    <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                        <input type="date" id="start-date" style="margin-bottom: 0;">
                        <input type="time" id="start-time" style="margin-bottom: 0;">
                    </div>
                    <label style="font-size: 0.8rem; font-weight: 500;">Fin</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="date" id="end-date" style="margin-bottom: 0;">
                        <input type="time" id="end-time" style="margin-bottom: 0;">
                    </div>
                </fieldset>
                <fieldset>
                    <legend>Préférences de Trajet</legend>
                    <label style="font-size: 0.8rem; font-weight: 500; display: block; margin-bottom: 5px;">Type de travail</label>
                    <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; font-size: 0.85rem;">
                        <label><input type="checkbox" class="work-type" value="BLOCK" checked> Block</label>
                        <label><input type="checkbox" class="work-type" value="ONE_WAY" checked> Aller simple</label>
                        <label><input type="checkbox" class="work-type" value="ROUND_TRIP" checked> Aller-retour</label>
                    </div>
                    <label style="font-size: 0.8rem; font-weight: 500; display: block; margin-bottom: 5px;">Type de conducteur</label>
                    <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; font-size: 0.85rem;">
                        <label><input type="checkbox" class="driver-type" value="SINGLE_DRIVER"> Seul</label>
                        <label><input type="checkbox" class="driver-type" value="TEAM_DRIVER"> Équipe</label>
                        <label><input type="checkbox" class="driver-type" value="TRAMPER_DRIVER"> Itinérant</label>
                    </div>
                    <label style="font-size: 0.8rem; font-weight: 500; display: block; margin-bottom: 5px;">Type de charge</label>
                    <div style="display: flex; gap: 10px; flex-wrap: wrap; font-size: 0.85rem;">
                        <label><input type="checkbox" class="load-type" value="LIVE"> En direct</label>
                        <label><input type="checkbox" class="load-type" value="DROP"> Déposer/Atteler</label>
                    </div>
                </fieldset>
                <fieldset>
                    <legend>Tarifs & Logistique Avancée</legend>
                    <div style="margin-bottom: 10px;">
                        <label style="font-size: 0.8rem; font-weight: 500;">Paiement Min (€)</label>
                        <input type="number" id="payout-min" step="1" placeholder="Ex: 500" style="margin-bottom: 0;">
                    </div>
                    <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                        <div style="flex: 1;">
                            <label style="font-size: 0.8rem; font-weight: 500;">Durée Min (h)</label>
                            <input type="number" id="duration-min" placeholder="Min" style="margin-bottom: 0;">
                        </div>
                        <div style="flex: 1;">
                            <label style="font-size: 0.8rem; font-weight: 500;">Durée Max (h)</label>
                            <input type="number" id="duration-max" placeholder="Max" style="margin-bottom: 0;">
                        </div>
                    </div>
                    <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                        <div style="flex: 1;">
                            <label style="font-size: 0.8rem; font-weight: 500;">Distance Min (km)</label>
                            <input type="number" id="distance-min" placeholder="Min" style="margin-bottom: 0;">
                        </div>
                        <div style="flex: 1;">
                            <label style="font-size: 0.8rem; font-weight: 500;">Distance Max (km)</label>
                            <input type="number" id="distance-max" placeholder="Max" style="margin-bottom: 0;">
                        </div>
                    </div>
                    <div>
                        <label style="font-size: 0.8rem; font-weight: 500;">Arrêts (Max)</label>
                        <select id="stops-max" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #D1D5DB; font-family: inherit; background: white;">
                            <option value="">Tout</option>
                            <option value="0">0 (Direct)</option>
                            <option value="1">1 Arrêt</option>
                            <option value="2">2 Arrêts</option>
                        </select>
                    </div>
                </fieldset>
            </div>
            
            <button id="save-filters" style="margin-top: 10px;">Enregistrer les filtres</button>
            <button id="close-filters" style="background: none; color: var(--text-light); margin-top: 10px; text-decoration: underline;">Fermer sans enregistrer</button>
        </div>
    </div>

    <div class="card">
        <h1>📱 Mes Liens</h1>
        
        <div id="auth-section">
            <p class="subtitle">Entrez vos informations pour vous identifier.</p>
            <input type="text" id="user-name" placeholder="Votre prénom ou pseudo..." required>
            <input type="tel" id="user-phone" placeholder="Votre numéro de téléphone (Ex: 0612345678)" required>
            <button id="request-permission">Activer l'appareil</button>
            <p id="error-msg" style="color: red; font-size: 0.8rem; margin-top: 10px;"></p>
        </div>

        <div id="main-app">
            <div id="messages" class="link-list">
                <div class="empty-state">En attente de vos premiers liens...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        // Suppression de getMessaging et getToken
        import { getFirestore, collection, onSnapshot, query, where, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyChQfZeEQkUaN6cnWTH94gsz1K_SObMdFg",
            authDomain: "mtc-cda71.firebaseapp.com",
            projectId: "mtc-cda71",
            storageBucket: "mtc-cda71.firebasestorage.app",
            messagingSenderId: "374572897705",
            appId: "1:374572897705:web:e68850486d26f5936f20b8",
            measurementId: "G-308XY3VP59"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // On cherche le téléphone au lieu du token dans le localStorage
        const savedPhone = localStorage.getItem('userPhone');

        if (savedPhone) {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            startListeningToLinks(savedPhone);
        }

        // --- AUTHENTIFICATION ---
        document.getElementById('request-permission').addEventListener('click', async () => {
            const errorMsg = document.getElementById('error-msg');
            const btn = document.getElementById('request-permission');
            const userNameInput = document.getElementById('user-name').value.trim();
            const userPhoneInput = document.getElementById('user-phone').value.trim();
            
            errorMsg.innerText = "";

            if (!userNameInput || !userPhoneInput) {
                errorMsg.innerText = "Veuillez entrer votre nom ET votre numéro de téléphone !";
                return;
            }

            try {
                btn.innerText = "Activation en cours...";
                btn.disabled = true;

                // Nettoyage du numéro de téléphone (on retire les espaces)
                const phoneId = userPhoneInput.replace(/\s+/g, '');

                // L'ID du document devient le numéro de téléphone, on enregistre dans la collection 'users'
                await setDoc(doc(db, "users", phoneId), {
                    phone: phoneId,
                    name: userNameInput,
                    createdAt: serverTimestamp(),
                    device: navigator.userAgent
                });

                // Sauvegarde locale
                localStorage.setItem('userPhone', phoneId);
                localStorage.setItem('userName', userNameInput);

                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                
                // On démarre l'écoute pour ce numéro précis
                startListeningToLinks(phoneId);

            } catch (error) {
                console.error(error);
                errorMsg.innerText = error.message;
                btn.innerText = "Activer l'appareil";
                btn.disabled = false;
            }
        });

        // --- ECOUTE DES LIENS ---
        function startListeningToLinks(phoneId) {
            // On cherche les liens où "phone" correspond
            const q = query(collection(db, "links"), where("phone", "==", phoneId));
            onSnapshot(q, (snapshot) => {
                const messagesDiv = document.getElementById('messages');
                let links = [];
                snapshot.forEach((doc) => links.push(doc.data()));
                links.sort((a, b) => (b.timestamp?.toMillis() || 0) - (a.timestamp?.toMillis() || 0));

                if (links.length === 0) {
                    messagesDiv.innerHTML = "<div class='empty-state'>Aucun lien reçu.</div>";
                    return;
                }

                messagesDiv.innerHTML = ""; 
                links.forEach(data => {
                    if(data.url) {
                        messagesDiv.innerHTML += `
                            <div class="link-item">
                                <span style="font-size: 1.2rem;">🔗</span> 
                                <a href="${data.url}" target="_blank">${data.url}</a>
                            </div>`;
                    }
                });
            });
        }

        // --- GESTION DE L'INTERFACE DES FILTRES ---
        const filterForm = document.getElementById('filter-form');
        document.getElementById('toggle-filters').addEventListener('click', () => filterForm.style.display = 'flex');
        document.getElementById('close-filters').addEventListener('click', () => filterForm.style.display = 'none');

        // GESTION DES ONGLETS
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');

        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                tabBtns.forEach(b => b.classList.remove('active'));
                tabContents.forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.target).classList.add('active');
            });
        });

        // --- LOGIQUE AUTOCOMPLÉTION ---
        let selectedOrigins = [];
        let selectedDestinations = [];

        function setupAutocomplete(inputId, suggestionsId, containerId, listArray) {
            const input = document.getElementById(inputId);
            const suggestions = document.getElementById(suggestionsId);
            const container = document.getElementById(containerId);

            input.addEventListener('input', async (e) => {
                const query = e.target.value.trim();
                if (query.length < 2) {
                    suggestions.style.display = 'none';
                    return;
                }
                
                try {
                    const response = await fetch(`https://geo.api.gouv.fr/communes?nom=${query}&fields=departement&boost=population&limit=5`);
                    const data = await response.json();
                    
                    suggestions.innerHTML = '';
                    if (data.length > 0) {
                        data.forEach(city => {
                            const li = document.createElement('li');
                            const depName = city.departement ? city.departement.nom : '';
                            li.textContent = `${city.nom} (${depName})`;
                            
                            li.addEventListener('click', () => {
                                if (!listArray.includes(city.nom)) {
                                    listArray.push(city.nom);
                                    renderTags(listArray, container);
                                }
                                input.value = '';
                                suggestions.style.display = 'none';
                            });
                            suggestions.appendChild(li);
                        });
                        suggestions.style.display = 'block';
                    } else {
                        suggestions.style.display = 'none';
                    }
                } catch (error) { console.error(error); }
            });

            document.addEventListener('click', (e) => {
                if (e.target !== input && e.target !== suggestions) {
                    suggestions.style.display = 'none';
                }
            });
        }

        function renderTags(listArray, container) {
            container.innerHTML = '';
            listArray.forEach(item => {
                const tag = document.createElement('div');
                tag.className = 'city-tag';
                
                const text = document.createElement('span');
                text.textContent = item;
                
                const closeBtn = document.createElement('span');
                closeBtn.className = 'close-btn';
                closeBtn.innerHTML = '&times;';
                closeBtn.addEventListener('click', () => {
                    const index = listArray.indexOf(item);
                    if (index > -1) listArray.splice(index, 1);
                    renderTags(listArray, container);
                });
                
                tag.appendChild(text);
                tag.appendChild(closeBtn);
                container.appendChild(tag);
            });
        }

        setupAutocomplete('origin-input', 'origin-suggestions', 'selected-origins', selectedOrigins);
        setupAutocomplete('dest-input', 'dest-suggestions', 'selected-destinations', selectedDestinations);

        // --- SAUVEGARDE DE TOUS LES FILTRES ---
        document.getElementById('save-filters').addEventListener('click', async () => {
            const userPhone = localStorage.getItem('userPhone');
            const userName = localStorage.getItem('userName');
            const saveBtn = document.getElementById('save-filters');

            if (!userPhone) {
                alert("Veuillez d'abord vous identifier avec votre numéro.");
                return;
            }

            const getCheckedValues = (selector) => Array.from(document.querySelectorAll(selector)).map(cb => cb.value);

            const filters = {
                origins: selectedOrigins,
                originRadius: parseFloat(document.getElementById('origin-radius').value) || null,
                equipment: document.getElementById('equipment-input').value || null,
                rateKmMin: parseFloat(document.getElementById('rate-km-min').value) || null,
                rateKmMax: parseFloat(document.getElementById('rate-km-max').value) || null,
                
                destinations: selectedDestinations,
                destRadius: parseFloat(document.getElementById('dest-radius').value) || null,
                
                startDate: document.getElementById('start-date').value || null,
                startTime: document.getElementById('start-time').value || null,
                endDate: document.getElementById('end-date').value || null,
                endTime: document.getElementById('end-time').value || null,
                
                workTypes: getCheckedValues('.work-type:checked'),
                driverTypes: getCheckedValues('.driver-type:checked'),
                loadTypes: getCheckedValues('.load-type:checked'),
                
                payoutMin: parseFloat(document.getElementById('payout-min').value) || null,
                durationMin: parseFloat(document.getElementById('duration-min').value) || null,
                durationMax: parseFloat(document.getElementById('duration-max').value) || null,
                distanceMin: parseFloat(document.getElementById('distance-min').value) || null,
                distanceMax: parseFloat(document.getElementById('distance-max').value) || null,
                stopsMax: document.getElementById('stops-max').value || null,
                
                updatedAt: serverTimestamp()
            };

            const n8nPayload = {
                userPhone: userPhone,
                userName: userName,
                ...filters,
                timestamp: new Date().toISOString()
            };

            const N8N_WEBHOOK_URL = "http://localhost:5678/webhook-test/sauvegarde-filtres"; 

            try {
                saveBtn.innerText = "Enregistrement...";
                saveBtn.disabled = true;
                
                // Sauvegarde sous le document identifié par le numéro de téléphone dans "users"
                await setDoc(doc(db, "users", userPhone), { filters: filters }, { merge: true });
                
                if (!N8N_WEBHOOK_URL.includes("votre-n8n.com")) {
                    await fetch(N8N_WEBHOOK_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(n8nPayload)
                    });
                }

                alert("Filtres enregistrés !");
                filterForm.style.display = 'none';
            } catch (e) {
                console.error(e);
                alert("Erreur lors de l'enregistrement.");
            } finally {
                saveBtn.innerText = "Enregistrer les filtres";
                saveBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
