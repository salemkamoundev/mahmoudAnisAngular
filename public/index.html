<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Récepteur de Liens</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg: #F3F4F6;
            --surface: #FFFFFF;
            --text: #1F2937;
            --text-light: #6B7280;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background: var(--surface);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: var(--text); }
        p.subtitle { color: var(--text-light); font-size: 0.9rem; margin-bottom: 1.5rem; }
        
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #D1D5DB;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
        }
        button:hover { background-color: var(--primary-hover); }
        button:disabled { background-color: #9CA3AF; cursor: not-allowed; }
        
        #main-app { display: none; }
        
        .link-list { text-align: left; max-height: 400px; overflow-y: auto; margin-top: 15px; }
        .link-item {
            background: #F9FAFB;
            border: 1px solid #E5E7EB;
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: transform 0.1s;
        }
        .link-item:hover { transform: translateX(4px); border-color: #D1D5DB; }
        .link-item a { color: var(--primary); text-decoration: none; font-weight: 500; word-break: break-all; }
        .link-item a:hover { text-decoration: underline; }
        .empty-state { text-align: center; color: var(--text-light); font-style: italic; padding: 20px 0; }

        /* NOUVEAUX STYLES : Bouton et Formulaire de filtres */
        #toggle-filters {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1001;
            width: auto;
            background-color: #10B981;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #toggle-filters:hover { background-color: #059669; }

        #filter-form {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(243, 244, 246, 0.95); /* Fond légèrement transparent */
            backdrop-filter: blur(5px);
            z-index: 1000;
            display: none; /* Deviendra flex via JS */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            box-sizing: border-box;
        }
        .filter-container {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: left;
        }

        /* STYLES : Autocomplétion et tags des villes */
        .autocomplete-wrapper { position: relative; }
        .suggestions-list {
            position: absolute;
            top: calc(100% - 15px);
            left: 0; right: 0;
            background: white;
            border: 1px solid #D1D5DB;
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
            margin: 0; padding: 0;
            list-style: none;
            z-index: 1002;
            display: none;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .suggestions-list li {
            padding: 10px 12px;
            cursor: pointer;
            font-size: 0.9rem;
            border-bottom: 1px solid #F3F4F6;
        }
        .suggestions-list li:hover { background-color: #F9FAFB; color: var(--primary); }
        
        .selected-cities-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }
        .city-tag {
            background-color: var(--primary);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .city-tag span.close-btn {
            cursor: pointer;
            font-weight: bold;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            width: 18px; height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .city-tag span.close-btn:hover { background: rgba(255,255,255,0.4); }
    </style>
</head>
<body>

    <button id="toggle-filters">⚙️ Mes Filtres de Recherche</button>

    <div id="filter-form">
        <div class="filter-container">
            <h2 style="margin-top: 0; margin-bottom: 1.5rem; text-align: center; color: var(--text);">⚙️ Filtres de Recherche</h2>
            
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <div style="flex: 1;">
                    <label style="font-size: 0.8rem; font-weight: 500;">Prix Min (€/km)</label>
                    <input type="number" id="price-min" step="0.01" placeholder="Ex: 1.00">
                </div>
                <div style="flex: 1;">
                    <label style="font-size: 0.8rem; font-weight: 500;">Prix Max (€/km)</label>
                    <input type="number" id="price-max" step="0.01" placeholder="Ex: 1.20">
                </div>
            </div>

            <label style="font-size: 0.8rem; font-weight: 500;">Villes (Recherche)</label>
            <div class="autocomplete-wrapper">
                <input type="text" id="city-input" placeholder="Tapez une ville (ex: Paris)..." autocomplete="off">
                <ul id="city-suggestions" class="suggestions-list"></ul>
            </div>
            
            <div id="selected-cities" class="selected-cities-container"></div>
            
            <button id="save-filters" style="margin-top: 10px;">Enregistrer les filtres</button>
            <button id="close-filters" style="background: none; color: var(--text-light); margin-top: 10px; text-decoration: underline;">Fermer sans enregistrer</button>
        </div>
    </div>

    <div class="card">
        <h1>📱 Mes Liens</h1>
        
        <div id="auth-section">
            <p class="subtitle">Entrez votre nom pour activer cet appareil.</p>
            <input type="text" id="user-name" placeholder="Votre prénom ou pseudo..." required>
            <button id="request-permission">Activer & Autoriser</button>
            <p id="error-msg" style="color: red; font-size: 0.8rem; margin-top: 10px;"></p>
        </div>

        <div id="main-app">
            <div id="messages" class="link-list">
                <div class="empty-state">En attente de vos premiers liens...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-messaging.js";
        import { getFirestore, collection, onSnapshot, query, where, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyChQfZeEQkUaN6cnWTH94gsz1K_SObMdFg",
            authDomain: "mtc-cda71.firebaseapp.com",
            projectId: "mtc-cda71",
            storageBucket: "mtc-cda71.firebasestorage.app",
            messagingSenderId: "374572897705",
            appId: "1:374572897705:web:e68850486d26f5936f20b8",
            measurementId: "G-308XY3VP59"
        };

        const app = initializeApp(firebaseConfig);
        const messaging = getMessaging(app);
        const db = getFirestore(app);

        const VAPID_KEY = "BJmYw2gCL-jJ7TeyaVeIZgBKM1o86fmowwxKOAEXh_je5FdHZcPrIY0w8KSfMoPN9_zUUN2zVvGDbgFFWr2zSXA";

        // VERIFICATION DE LA MÉMOIRE LOCALE
        const savedToken = localStorage.getItem('fcmToken');

        if (savedToken) {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            startListeningToLinks(savedToken);
        }

        // ENREGISTREMENT (PREMIÈRE VISITE)
        document.getElementById('request-permission').addEventListener('click', async () => {
            const errorMsg = document.getElementById('error-msg');
            const btn = document.getElementById('request-permission');
            const userNameInput = document.getElementById('user-name').value.trim();
            
            errorMsg.innerText = "";

            if (!userNameInput) {
                errorMsg.innerText = "Veuillez entrer votre nom !";
                return;
            }

            if(VAPID_KEY === "VOTRE_CLE_VAPID_ICI") {
                errorMsg.innerText = "🚨 Remplacez la clé VAPID dans le code source !";
                return;
            }

            try {
                btn.innerText = "Activation en cours...";
                btn.disabled = true;

                const permission = await Notification.requestPermission();
                if (permission !== 'granted') {
                    throw new Error("Vous devez autoriser les notifications pour recevoir les liens.");
                }

                const registration = await navigator.serviceWorker.register('/firebase-messaging-sw.js');
                await navigator.serviceWorker.ready;

                const currentToken = await getToken(messaging, { 
                    vapidKey: VAPID_KEY,
                    serviceWorkerRegistration: registration 
                });

                if (!currentToken) throw new Error("Impossible de générer le token.");

                await setDoc(doc(db, "tokens", currentToken), {
                    token: currentToken,
                    name: userNameInput,
                    createdAt: serverTimestamp(),
                    device: navigator.userAgent
                });

                localStorage.setItem('fcmToken', currentToken);
                localStorage.setItem('userName', userNameInput);

                document.getElementById('auth-section').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                startListeningToLinks(currentToken);

            } catch (error) {
                console.error(error);
                errorMsg.innerText = error.message;
                btn.innerText = "Activer & Autoriser";
                btn.disabled = false;
            }
        });

        // RÉCUPÉRATION DES LIENS EN TEMPS RÉEL
        function startListeningToLinks(userToken) {
            const q = query(collection(db, "links"), where("token", "==", userToken));
            
            onSnapshot(q, (snapshot) => {
                const messagesDiv = document.getElementById('messages');
                let links = [];
                
                snapshot.forEach((doc) => links.push(doc.data()));

                links.sort((a, b) => {
                    const timeA = a.timestamp ? a.timestamp.toMillis() : 0;
                    const timeB = b.timestamp ? b.timestamp.toMillis() : 0;
                    return timeB - timeA;
                });

                if (links.length === 0) {
                    messagesDiv.innerHTML = "<div class='empty-state'>Aucun lien reçu pour le moment.</div>";
                    return;
                }

                messagesDiv.innerHTML = ""; 
                links.forEach(data => {
                    if(data.url) {
                        messagesDiv.innerHTML += `
                            <div class="link-item">
                                <span style="font-size: 1.2rem;">🔗</span> 
                                <a href="${data.url}" target="_blank">${data.url}</a>
                            </div>`;
                    }
                });
            });
        }

        onMessage(messaging, (payload) => {
            console.log('Nouveau lien reçu !', payload);
        });

        // --- GESTION DE L'INTERFACE DES FILTRES ---
        const filterForm = document.getElementById('filter-form');
        const toggleBtn = document.getElementById('toggle-filters');
        const closeFiltersBtn = document.getElementById('close-filters');

        // Afficher / masquer le formulaire (en mode flex pour centrer)
        toggleBtn.addEventListener('click', () => filterForm.style.display = 'flex');
        closeFiltersBtn.addEventListener('click', () => filterForm.style.display = 'none');

        // --- LOGIQUE AUTOCOMPLÉTION DES VILLES ---
        const cityInput = document.getElementById('city-input');
        const citySuggestions = document.getElementById('city-suggestions');
        const selectedCitiesContainer = document.getElementById('selected-cities');
        let selectedCitiesList = []; // Stockera les villes choisies

        cityInput.addEventListener('input', async (e) => {
            const query = e.target.value.trim();
            if (query.length < 2) {
                citySuggestions.style.display = 'none';
                return;
            }
            
            try {
                // Requête API publique du gouvernement français
                const response = await fetch(`https://geo.api.gouv.fr/communes?nom=${query}&fields=departement&boost=population&limit=5`);
                const data = await response.json();
                
                citySuggestions.innerHTML = '';
                if (data.length > 0) {
                    data.forEach(city => {
                        const li = document.createElement('li');
                        const depName = city.departement ? city.departement.nom : '';
                        li.textContent = `${city.nom} (${depName})`;
                        
                        // Action au clic
                        li.addEventListener('click', () => {
                            addCity(city.nom);
                            cityInput.value = '';
                            citySuggestions.style.display = 'none';
                        });
                        citySuggestions.appendChild(li);
                    });
                    citySuggestions.style.display = 'block';
                } else {
                    citySuggestions.style.display = 'none';
                }
            } catch (error) {
                console.error("Erreur avec l'API Géo:", error);
            }
        });

        // Cacher l'autocomplétion si clic en dehors
        document.addEventListener('click', (e) => {
            if (e.target !== cityInput && e.target !== citySuggestions) {
                citySuggestions.style.display = 'none';
            }
        });

        // Fonctions de gestion des tags de ville
        function addCity(cityName) {
            if (!selectedCitiesList.includes(cityName)) {
                selectedCitiesList.push(cityName);
                renderCities();
            }
        }

        function removeCity(cityName) {
            selectedCitiesList = selectedCitiesList.filter(c => c !== cityName);
            renderCities();
        }

        function renderCities() {
            selectedCitiesContainer.innerHTML = '';
            selectedCitiesList.forEach(city => {
                const tag = document.createElement('div');
                tag.className = 'city-tag';
                
                const text = document.createElement('span');
                text.textContent = city;
                
                const closeBtn = document.createElement('span');
                closeBtn.className = 'close-btn';
                closeBtn.innerHTML = '&times;';
                closeBtn.addEventListener('click', () => removeCity(city));
                
                tag.appendChild(text);
                tag.appendChild(closeBtn);
                selectedCitiesContainer.appendChild(tag);
            });
        }

        // --- SAUVEGARDE DANS FIRESTORE ---
        // --- SAUVEGARDE DANS FIRESTORE ET ENVOI À N8N ---
        document.getElementById('save-filters').addEventListener('click', async () => {
            const userToken = localStorage.getItem('fcmToken');
            const userName = localStorage.getItem('userName'); // On récupère aussi le nom pour n8n
            const saveBtn = document.getElementById('save-filters');

            if (!userToken) {
                alert("Veuillez d'abord activer l'appareil (sauvegarder votre nom).");
                return;
            }

            // 1. Préparation des données
            const filters = {
                priceMin: parseFloat(document.getElementById('price-min').value) || 0,
                priceMax: parseFloat(document.getElementById('price-max').value) || 0,
                cities: selectedCitiesList,
                updatedAt: serverTimestamp()
            };

            // Données spécifiques pour n8n (on inclut le token et le nom pour identifier l'utilisateur)
            const n8nPayload = {
                userToken: userToken,
                userName: userName,
                priceMin: filters.priceMin,
                priceMax: filters.priceMax,
                cities: filters.cities,
                timestamp: new Date().toISOString()
            };

            // ⚠️ REMPLACEZ CETTE URL PAR L'URL DE VOTRE WEBHOOK N8N
            const N8N_WEBHOOK_URL = "http://localhost:5678/webhook-test/sauvegarde-filtres"; 

            try {
                saveBtn.innerText = "Enregistrement...";
                saveBtn.disabled = true;
                
                // 2. Sauvegarde dans Firestore (optionnel si vous ne voulez utiliser QUE n8n, mais recommandé de le garder)
                await setDoc(doc(db, "tokens", userToken), filters, { merge: true });
                
                // 3. Envoi des données à n8n via une requête POST
                if (N8N_WEBHOOK_URL !== "https://votre-n8n.com/webhook/sauvegarde-filtres") {
                    await fetch(N8N_WEBHOOK_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(n8nPayload)
                    });
                    console.log("Données envoyées à n8n avec succès !");
                } else {
                    console.warn("L'URL du Webhook n8n n'a pas été configurée.");
                }

                alert("Filtres enregistrés !");
                filterForm.style.display = 'none';
            } catch (e) {
                console.error("Erreur d'enregistrement:", e);
                alert("Erreur lors de l'enregistrement.");
            } finally {
                saveBtn.innerText = "Enregistrer les filtres";
                saveBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
